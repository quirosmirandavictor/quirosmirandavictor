name: GitHub Profile Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: quirosmirandavictor
          filename: metrics.svg
          template: classic
          config_timezone: America/Costa_Rica
          config_theme: dark
          config_display: large
          config_animations: yes
          base: header, activity, community, repositories, metadata
          repositories_affiliations: owner, collaborator, organization_member
          plugin_languages: yes
          plugin_languages_analysis_timeout: 10
          plugin_languages_categories: markup, programming, data
          plugin_languages_colors: github
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 12
          plugin_languages_threshold: 0%
          plugin_languages_sections: most-used
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_stars: yes

      - name: Construir bloque de contenido
        run: |
          if [ "${{ vars.SHOW_METRICS }}" = "true" ]; then
            cat > /tmp/section.md << 'EOF'
          <div align="center">

          ![metrics](./metrics.svg)

          </div>
          EOF
          else
            cat > /tmp/section.md << 'EOF'
          <div align="center">

          ## GitHub Analytics
          ![](https://github-profile-summary-cards.vercel.app/api/cards/profile-details?username=quirosmirandavictor&theme=github_dark)
          <table>
          <tr>
          <td>

          ![](https://github-profile-summary-cards.vercel.app/api/cards/stats?username=quirosmirandavictor&theme=github_dark)

          </td>
          <td>

          ![](https://github-profile-summary-cards.vercel.app/api/cards/most-commit-language?username=quirosmirandavictor&theme=github_dark)

          </td>
          <td>

          ![](https://github-profile-summary-cards.vercel.app/api/cards/productive-time?username=quirosmirandavictor&theme=github_dark&utcOffset=-6)

          </td>
          </tr>
          </table>
          </div>
          EOF
          fi

      - name: Insertar bloque en README.md
        run: |
          python3 - << 'PYEOF'
          import re

          with open('README.md', encoding='utf-8') as f:
              content = f.read()
          with open('/tmp/section.md', encoding='utf-8') as f:
              section = f.read().strip()

          new_block = f"<!-- METRICS:START -->\n{section}\n<!-- METRICS:END -->"
          content = re.sub(
              r'<!-- METRICS:START -->.*?<!-- METRICS:END -->',
              new_block,
              content,
              flags=re.DOTALL,
          )

          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(content)
          PYEOF

      - name: Commit y push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md metrics.svg
          git diff --staged --quiet || git commit -m "chore: actualizar perfil"
          git push
