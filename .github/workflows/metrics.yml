name: GitHub Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # ⚠️ Necesita un PAT propio (ver nota abajo), github.token no ve tus repos privados
          token: ${{ secrets.METRICS_TOKEN }}
          user: quirosmirandavictor
          filename: metrics.svg

          # --- Apariencia ---
          template: classic
          config_timezone: America/Costa_Rica
          config_theme: dark
          config_display: large
          config_animations: yes

          # --- Secciones base ---
          base: header, activity, community, repositories, metadata

          # --- Incluir repos privados y de organizaciones ---
          repositories_affiliations: owner, collaborator, organization_member

          # --- Lenguajes: más variedad, en formato de barras ---
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming, data
          plugin_languages_colors: github
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 12
          plugin_languages_threshold: 0%
          plugin_languages_sections: most-used, recently-used
          plugin_languages_recent_categories: markup, programming, data
          plugin_languages_recent_days: 30
          plugin_languages_recent_load: 300

          # --- Calendario de contribuciones (heatmap gráfico) ---
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # --- Hábitos de código (ya es un gráfico isométrico) ---
          plugin_habits: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 30
          plugin_habits_facts: yes

          # --- Gráficos extra ---
          plugin_lines: yes
          plugin_lines_sections: repositories, diff-history
          plugin_stars: yes
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
